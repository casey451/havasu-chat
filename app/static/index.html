<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Havasu Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f6f8;
      --user-bg: #0d6efd;
      --user-fg: #fff;
      --bot-bg: #e9ecef;
      --bot-fg: #212529;
      --border: #dee2e6;
      --radius: 18px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: #212529;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 100dvh;
    }
    header {
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: #6c757d;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row.user .bubble {
      background: var(--user-bg);
      color: var(--user-fg);
      border-bottom-right-radius: 6px;
    }
    .row.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-fg);
      border-bottom-left-radius: 6px;
    }
    .row.bot .bubble.loading {
      color: #6c757d;
      font-style: italic;
    }
    .composer {
      display: flex;
      gap: 8px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      font-size: 1rem;
      outline: none;
    }
    #msg:focus {
      border-color: #86b7fe;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }
    #send {
      min-width: 72px;
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 22px;
      background: var(--user-bg);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      max-width: 100%;
    }
    .chip {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #212529;
      font-size: 0.88rem;
      line-height: 1.3;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      text-align: left;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active {
      background: #e9ecef;
    }
    .event-share-btn {
      margin-top: 12px;
      align-self: flex-start;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #495057;
      border-radius: 999px;
      padding: 10px 16px;
      min-height: 44px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .event-share-btn:active {
      background: #e9ecef;
    }
    /* Calendar button in header */
    header {
      position: relative;
    }
    .calendar-btn {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top));
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .calendar-btn:active {
      background: #e9ecef;
    }
    /* Calendar overlay */
    .calendar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: stretch;
      justify-content: center;
      z-index: 999;
      padding: 0;
    }
    .calendar-overlay.open {
      display: flex;
    }
    .calendar-shell {
      width: 100%;
      max-width: 600px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .calendar-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .calendar-head h2 {
      flex: 1;
      margin: 0;
      font-size: 1.05rem;
      text-align: center;
    }
    .calendar-nav, .calendar-close {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 1.1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px 10px;
      color: #6c757d;
      font-size: 0.8rem;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 10px 10px;
    }
    .cal-cell {
      min-height: 48px;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: #fafafa;
      font-size: 0.95rem;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .cal-cell.empty { background: transparent; cursor: default; }
    .cal-cell.today { border-color: #0d6efd; font-weight: 700; }
    .cal-cell.has-events { background: #e7f1ff; color: #084298; font-weight: 600; }
    .cal-cell.has-events::after {
      content: "";
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0d6efd;
    }
    .cal-cell.selected { border-color: #198754; background: #d1e7dd; }
    .calendar-day-detail {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      overflow-y: auto;
      flex: 1 1 auto;
      -webkit-overflow-scrolling: touch;
    }
    .calendar-day-detail h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .cal-event {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #fff;
    }
    .cal-event .title { font-weight: 600; }
    .cal-event .when { color: #495057; font-size: 0.88rem; margin-top: 2px; }
    .cal-event .where { color: #6c757d; font-size: 0.85rem; margin-top: 2px; }
    .cal-empty-day {
      color: #6c757d;
      font-size: 0.92rem;
      padding: 8px 4px;
    }
    .cal-loading {
      color: #6c757d;
      font-style: italic;
      padding: 8px 4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Havasu Chat</h1>
      <p>Lake Havasu activities & events — search, browse, or share something new.</p>
      <button id="calendar-btn" class="calendar-btn" type="button" aria-label="Open calendar">📅</button>
    </header>
    <div id="log" role="log" aria-live="polite"></div>
    <form class="composer" id="form">
      <input id="msg" type="text" autocomplete="off" placeholder="Message…" enterkeyhint="send" />
      <button type="submit" id="send">Send</button>
    </form>
  </div>
  <div id="calendar-overlay" class="calendar-overlay" role="dialog" aria-modal="true" aria-label="Events calendar">
    <div class="calendar-shell">
      <div class="calendar-head">
        <button id="cal-prev" class="calendar-nav" type="button" aria-label="Previous month">‹</button>
        <h2 id="cal-title">—</h2>
        <button id="cal-next" class="calendar-nav" type="button" aria-label="Next month">›</button>
        <button id="cal-close" class="calendar-close" type="button" aria-label="Close calendar">✕</button>
      </div>
      <div class="calendar-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div id="cal-grid" class="calendar-grid"></div>
      <div id="cal-day-detail" class="calendar-day-detail"></div>
    </div>
  </div>
  <script>
    (function () {
      var sessionId = (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : "s-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      var log = document.getElementById("log");
      var form = document.getElementById("form");
      var input = document.getElementById("msg");
      var sendBtn = document.getElementById("send");

      function scrollToBottom() {
        log.scrollTop = log.scrollHeight;
      }

      function addRow(role, text, extraClass) {
        var row = document.createElement("div");
        row.className = "row " + (role === "user" ? "user" : "bot");
        var bubble = document.createElement("div");
        bubble.className = "bubble" + (extraClass ? " " + extraClass : "");
        bubble.textContent = text;
        row.appendChild(bubble);
        log.appendChild(row);
        scrollToBottom();
        return bubble;
      }

      function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled = on;
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "absolute";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          textarea.setSelectionRange(0, textarea.value.length);
          try {
            var ok = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (ok) resolve();
            else reject(new Error("copy failed"));
          } catch (err) {
            document.body.removeChild(textarea);
            reject(err);
          }
        });
      }

      function setTemporaryButtonText(btn, text) {
        var original = btn.getAttribute("data-default-label") || "Share";
        btn.textContent = text;
        window.setTimeout(function () {
          btn.textContent = original;
        }, 2000);
      }

      function attachShareButtons() {
        var cards = log.querySelectorAll(".event-card[data-event-id]");
        cards.forEach(function (card) {
          if (card.querySelector(".event-share-btn")) return;
          var eventId = card.getAttribute("data-event-id");
          if (!eventId) return;
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "event-share-btn";
          btn.textContent = "Share";
          btn.setAttribute("data-default-label", "Share");
          btn.addEventListener("click", function () {
            var permalink = window.location.origin + "/events/" + eventId;
            copyToClipboard(permalink)
              .then(function () {
                setTemporaryButtonText(btn, "Link copied");
              })
              .catch(function () {
                setTemporaryButtonText(btn, "Copy failed");
              });
          });
          card.appendChild(btn);
        });
      }

      function removeWelcomeChips() {
        var w = log.querySelector(".chips-wrap");
        if (w) w.remove();
      }

      var EXAMPLE_PROMPTS = [
        "What's on this weekend?",
        "Kids activities or swim lessons",
        "I'd like to add an event",
      ];

      var VISITED_KEY = "havasuchat_has_visited";

      function hasVisitedBefore() {
        try {
          return window.localStorage.getItem(VISITED_KEY) === "true";
        } catch (err) {
          return false;
        }
      }

      function markVisited() {
        try {
          window.localStorage.setItem(VISITED_KEY, "true");
        } catch (err) {
          /* localStorage unavailable — treat as first-time each load */
        }
      }

      function showWelcome() {
        addRow(
          "bot",
          "Welcome. Ask what’s happening in town, search by interest, or say you want to add an event — I’ll walk you through it."
        );
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Example prompts");
        EXAMPLE_PROMPTS.forEach(function (label) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = label;
          chip.addEventListener("click", function () {
            input.value = label;
            if (form.requestSubmit) form.requestSubmit();
            else form.dispatchEvent(new Event("submit", { cancelable: true }));
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
      }

      function showWelcomeReturning() {
        addRow("bot", "Welcome back — what's happening in Havasu?");
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Example prompts");
        var items = [
          { label: "This weekend", message: "whats happening this weekend" },
          { label: "Add an event", message: "add an event" },
        ];
        items.forEach(function (item) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = item.label;
          chip.addEventListener("click", function () {
            input.value = item.message;
            if (form.requestSubmit) form.requestSubmit();
            else form.dispatchEvent(new Event("submit", { cancelable: true }));
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
      }

      var isReturningVisitor = hasVisitedBefore();
      if (isReturningVisitor) {
        showWelcomeReturning();
      } else {
        showWelcome();
        markVisited();
      }
      window.setTimeout(function () {
        if (!log.querySelector(".chips-wrap")) {
          if (isReturningVisitor) {
            showWelcomeReturning();
          } else {
            showWelcome();
          }
        }
      }, 150);

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        removeWelcomeChips();
        input.value = "";
        addRow("user", text);
        var pending = addRow("bot", "…", "loading");

        setLoading(true);
        fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        })
          .then(function (res) {
            if (!res.ok) throw new Error("Request failed");
            return res.json();
          })
          .then(function (data) {
            pending.textContent = data.response || "(no response)";
            attachShareButtons();
            scrollToBottom();
          })
          .catch(function () {
            pending.classList.remove("loading");
            pending.textContent = "Hmm, that didn’t go through — check your connection and try again.";
            scrollToBottom();
          })
          .finally(function () {
            setLoading(false);
            input.focus();
          });
      });

      input.focus();
      attachShareButtons();
    })();

    // Calendar overlay (Session AC-1). Self-contained; does not share state
    // with the chat IIFE above. Reads /events once and caches in memory.
    (function () {
      var overlay = document.getElementById("calendar-overlay");
      var btn = document.getElementById("calendar-btn");
      var titleEl = document.getElementById("cal-title");
      var gridEl = document.getElementById("cal-grid");
      var detailEl = document.getElementById("cal-day-detail");
      var prevBtn = document.getElementById("cal-prev");
      var nextBtn = document.getElementById("cal-next");
      var closeBtn = document.getElementById("cal-close");
      if (!overlay || !btn) return;

      var state = {
        year: new Date().getFullYear(),
        month: new Date().getMonth(),
        selectedKey: null,
        eventsByDate: null,
        loading: false,
      };

      var MONTH_LABELS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December",
      ];

      function pad(n) { return n < 10 ? "0" + n : String(n); }
      function dateKey(y, m, d) { return y + "-" + pad(m + 1) + "-" + pad(d); }

      function isToday(y, m, d) {
        var t = new Date();
        return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
      }

      function fmtTime(isoTime) {
        if (!isoTime) return "";
        var parts = isoTime.split(":");
        var h = parseInt(parts[0], 10);
        var m = parts[1] || "00";
        var ampm = h < 12 ? "AM" : "PM";
        var h12 = h % 12;
        if (h12 === 0) h12 = 12;
        return h12 + ":" + m + " " + ampm;
      }

      function loadEvents() {
        if (state.eventsByDate !== null || state.loading) return;
        state.loading = true;
        detailEl.innerHTML = '<div class="cal-loading">Loading events…</div>';
        fetch("/events", { headers: { "Accept": "application/json" } })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (events) {
            var map = {};
            (events || []).forEach(function (ev) {
              if (!ev || ev.status !== "live") return;
              var key = ev.date;
              if (!key) return;
              (map[key] = map[key] || []).push(ev);
            });
            Object.keys(map).forEach(function (k) {
              map[k].sort(function (a, b) {
                return (a.start_time || "").localeCompare(b.start_time || "");
              });
            });
            state.eventsByDate = map;
            state.loading = false;
            render();
          })
          .catch(function () {
            state.eventsByDate = {};
            state.loading = false;
            render();
          });
      }

      function renderGrid() {
        titleEl.textContent = MONTH_LABELS[state.month] + " " + state.year;
        gridEl.innerHTML = "";
        var first = new Date(state.year, state.month, 1);
        var leading = first.getDay();
        var daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
        for (var i = 0; i < leading; i++) {
          var blank = document.createElement("div");
          blank.className = "cal-cell empty";
          gridEl.appendChild(blank);
        }
        for (var d = 1; d <= daysInMonth; d++) {
          var cell = document.createElement("button");
          cell.type = "button";
          cell.className = "cal-cell";
          cell.textContent = d;
          var key = dateKey(state.year, state.month, d);
          cell.setAttribute("data-key", key);
          if (isToday(state.year, state.month, d)) cell.classList.add("today");
          if (state.eventsByDate && state.eventsByDate[key]) cell.classList.add("has-events");
          if (state.selectedKey === key) cell.classList.add("selected");
          cell.addEventListener("click", (function (k) {
            return function () { selectDay(k); };
          })(key));
          gridEl.appendChild(cell);
        }
      }

      function renderDetail() {
        if (state.loading) {
          detailEl.innerHTML = '<div class="cal-loading">Loading events…</div>';
          return;
        }
        if (!state.selectedKey) {
          detailEl.innerHTML = '<div class="cal-empty-day">Tap a highlighted day to see what\'s on.</div>';
          return;
        }
        var events = (state.eventsByDate && state.eventsByDate[state.selectedKey]) || [];
        var parts = state.selectedKey.split("-");
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10) - 1;
        var d = parseInt(parts[2], 10);
        var label = MONTH_LABELS[m] + " " + d + ", " + y;
        var html = "<h3>" + label + "</h3>";
        if (events.length === 0) {
          html += '<div class="cal-empty-day">Nothing on the calendar for that day.</div>';
        } else {
          events.forEach(function (ev) {
            var when = fmtTime(ev.start_time);
            if (ev.end_time) when += " – " + fmtTime(ev.end_time);
            var titleTxt = (ev.title || "").replace(/</g, "&lt;");
            var locTxt = (ev.location_name || "").replace(/</g, "&lt;");
            html += '<div class="cal-event">' +
              '<div class="title">' + titleTxt + "</div>" +
              '<div class="when">' + when + "</div>" +
              '<div class="where">' + locTxt + "</div>" +
              "</div>";
          });
        }
        detailEl.innerHTML = html;
      }

      function render() {
        renderGrid();
        renderDetail();
      }

      function selectDay(key) {
        state.selectedKey = key;
        render();
      }

      function openCalendar() {
        overlay.classList.add("open");
        document.body.style.overflow = "hidden";
        loadEvents();
        render();
      }

      function closeCalendar() {
        overlay.classList.remove("open");
        document.body.style.overflow = "";
      }

      btn.addEventListener("click", openCalendar);
      closeBtn.addEventListener("click", closeCalendar);
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeCalendar();
      });
      prevBtn.addEventListener("click", function () {
        state.month -= 1;
        if (state.month < 0) { state.month = 11; state.year -= 1; }
        render();
      });
      nextBtn.addEventListener("click", function () {
        state.month += 1;
        if (state.month > 11) { state.month = 0; state.year += 1; }
        render();
      });
      document.addEventListener("keydown", function (e) {
        if (!overlay.classList.contains("open")) return;
        if (e.key === "Escape") { e.preventDefault(); closeCalendar(); }
      });

      // Expose a hook so AC-2 (chat integration) can open from the chat flow.
      window.havasuChatCalendar = {
        open: openCalendar,
        close: closeCalendar,
        selectDay: function (key) {
          state.selectedKey = key;
          // Jump to that month if needed.
          var parts = (key || "").split("-");
          if (parts.length === 3) {
            state.year = parseInt(parts[0], 10);
            state.month = parseInt(parts[1], 10) - 1;
          }
          openCalendar();
        },
      };
    })();
  </script>
</body>
</html>
