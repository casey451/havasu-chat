<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Havasu Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f6f8;
      --user-bg: #0d6efd;
      --user-fg: #fff;
      --bot-bg: #e9ecef;
      --bot-fg: #212529;
      --border: #dee2e6;
      --radius: 18px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: #212529;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 100dvh;
    }
    header {
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: #6c757d;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.bot {
      justify-content: flex-start;
      flex-direction: column;
      align-items: flex-start;
    }
    .msg-feedback {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 6px;
      max-width: 100%;
    }
    .msg-feedback-btns {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .thumb-btn {
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      font-size: 1.25rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .thumb-btn:active {
      background: #e9ecef;
    }
    .thumb-btn.thumb-selected {
      background: var(--user-bg);
      color: var(--user-fg);
      border-color: var(--user-bg);
      pointer-events: none;
    }
    .thumb-btn.thumb-dim {
      opacity: 0.48;
      cursor: pointer;
    }
    .msg-feedback-err {
      display: none;
      font-size: 0.78rem;
      color: #842029;
      max-width: 220px;
      line-height: 1.35;
    }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row.user .bubble {
      background: var(--user-bg);
      color: var(--user-fg);
      border-bottom-right-radius: 6px;
    }
    .row.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-fg);
      border-bottom-left-radius: 6px;
    }
    .row.bot .bubble.loading {
      color: #6c757d;
      font-style: italic;
    }
    .catalog-link {
      text-align: center;
      font-size: 0.82rem;
      padding: 6px 16px 14px;
      color: #6c757d;
    }
    .catalog-link a {
      color: #0d6efd;
      font-weight: 600;
      text-decoration: none;
    }
    .site-footer {
      text-align: center;
      font-size: 0.78rem;
      padding: 0 16px calc(10px + env(safe-area-inset-bottom));
      color: #6c757d;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .site-footer a {
      color: #0d6efd;
      font-weight: 600;
      text-decoration: none;
    }
    .site-footer a:hover {
      text-decoration: underline;
    }
    .composer {
      display: flex;
      gap: 8px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      font-size: 1rem;
      outline: none;
    }
    #msg:focus {
      border-color: #86b7fe;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }
    #send {
      min-width: 72px;
      min-height: 44px;
      padding: 0 16px;
      border: none;
      border-radius: 22px;
      background: var(--user-bg);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      max-width: 100%;
    }
    .chip {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #212529;
      font-size: 0.88rem;
      line-height: 1.3;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      text-align: left;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active {
      background: #e9ecef;
    }
    .event-share-btn {
      margin-top: 12px;
      align-self: flex-start;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #495057;
      border-radius: 999px;
      padding: 10px 16px;
      min-height: 44px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .event-share-btn:active {
      background: #e9ecef;
    }
    /* Calendar button in header */
    header {
      position: relative;
    }
    .calendar-btn {
      position: absolute;
      top: calc(8px + env(safe-area-inset-top));
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 1.15rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .calendar-btn:active {
      background: #e9ecef;
    }
    /* Calendar overlay */
    .calendar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: stretch;
      justify-content: center;
      z-index: 999;
      padding: 0;
    }
    .calendar-overlay.open {
      display: flex;
    }
    .calendar-shell {
      width: 100%;
      max-width: 600px;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .calendar-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .calendar-head h2 {
      flex: 1;
      margin: 0;
      font-size: 1.05rem;
      text-align: center;
    }
    .calendar-nav, .calendar-close {
      width: 44px;
      height: 44px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 1.1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 8px 10px;
      color: #6c757d;
      font-size: 0.8rem;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 10px 10px;
    }
    .cal-cell {
      min-height: 48px;
      padding: 6px 4px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: #fafafa;
      font-size: 0.95rem;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .cal-cell.empty { background: transparent; cursor: default; }
    .cal-cell.today { border-color: #0d6efd; font-weight: 700; }
    .cal-cell.has-events { background: #e7f1ff; color: #084298; font-weight: 600; }
    .cal-cell.has-events::after {
      content: "";
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #0d6efd;
    }
    .cal-cell.selected { border-color: #198754; background: #d1e7dd; }
    .calendar-day-detail {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      overflow-y: auto;
      flex: 1 1 auto;
      -webkit-overflow-scrolling: touch;
    }
    .calendar-day-detail h3 {
      margin: 0 0 10px;
      font-size: 1rem;
    }
    .cal-event {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-event:hover {
      background: #f8f9fa;
    }
    .cal-event:focus {
      outline: 2px solid #0d6efd;
      outline-offset: 2px;
    }
    .cal-event .title { font-weight: 600; }
    .cal-event .when { color: #495057; font-size: 0.88rem; margin-top: 2px; }
    .cal-event .where { color: #6c757d; font-size: 0.85rem; margin-top: 2px; }
    .cal-empty-day {
      color: #6c757d;
      font-size: 0.92rem;
      padding: 8px 4px;
    }
    .cal-loading {
      color: #6c757d;
      font-style: italic;
      padding: 8px 4px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Havasu Chat</h1>
      <p>Lake Havasu activities & events — search, browse, or share something new.</p>
      <button id="calendar-btn" class="calendar-btn" type="button" aria-label="Open calendar">📅</button>
    </header>
    <div id="log" role="log" aria-live="polite"></div>
    <form class="composer" id="form">
      <input id="msg" type="text" autocomplete="off" placeholder="Message…" enterkeyhint="send" />
      <button type="submit" id="send">Send</button>
    </form>
    <p class="catalog-link"><a href="/contribute">Add to catalog →</a></p>
    <footer class="site-footer">
      <a href="/privacy">Privacy</a>
    </footer>
  </div>
  <div id="calendar-overlay" class="calendar-overlay" role="dialog" aria-modal="true" aria-label="Events calendar">
    <div class="calendar-shell">
      <div class="calendar-head">
        <button id="cal-prev" class="calendar-nav" type="button" aria-label="Previous month">‹</button>
        <h2 id="cal-title">—</h2>
        <button id="cal-next" class="calendar-nav" type="button" aria-label="Next month">›</button>
        <button id="cal-close" class="calendar-close" type="button" aria-label="Close calendar">✕</button>
      </div>
      <div class="calendar-weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
      </div>
      <div id="cal-grid" class="calendar-grid"></div>
      <div id="cal-day-detail" class="calendar-day-detail"></div>
    </div>
  </div>
  <script>
    (function () {
      var sessionId = (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : "s-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      var log = document.getElementById("log");
      var form = document.getElementById("form");
      var input = document.getElementById("msg");
      var sendBtn = document.getElementById("send");

      function scrollToBottom() {
        log.scrollTop = log.scrollHeight;
      }

      function addRow(role, text, extraClass) {
        var row = document.createElement("div");
        row.className = "row " + (role === "user" ? "user" : "bot");
        var bubble = document.createElement("div");
        bubble.className = "bubble" + (extraClass ? " " + extraClass : "");
        bubble.textContent = text;
        row.appendChild(bubble);
        log.appendChild(row);
        scrollToBottom();
        return { row: row, bubble: bubble };
      }

      function attachFeedbackThumbs(row, chatLogId) {
        if (!chatLogId || row.querySelector(".msg-feedback")) return;
        var wrap = document.createElement("div");
        wrap.className = "msg-feedback";
        var btnRow = document.createElement("div");
        btnRow.className = "msg-feedback-btns";
        var errEl = document.createElement("span");
        errEl.className = "msg-feedback-err";
        errEl.setAttribute("aria-live", "polite");

        var up = document.createElement("button");
        up.type = "button";
        up.className = "thumb-btn";
        up.setAttribute("aria-label", "Thumbs up");
        up.textContent = "👍";

        var down = document.createElement("button");
        down.type = "button";
        down.className = "thumb-btn";
        down.setAttribute("aria-label", "Thumbs down");
        down.textContent = "👎";

        var inflight = false;
        var lockedSignal = null;

        function clearError() {
          errEl.textContent = "";
          errEl.style.display = "none";
        }

        function showError(msg) {
          errEl.textContent = msg;
          errEl.style.display = "block";
        }

        function setLockedUI(signal) {
          lockedSignal = signal;
          up.classList.remove("thumb-selected", "thumb-dim");
          down.classList.remove("thumb-selected", "thumb-dim");
          if (signal === "positive") {
            up.classList.add("thumb-selected");
            down.classList.add("thumb-dim");
          } else {
            down.classList.add("thumb-selected");
            up.classList.add("thumb-dim");
          }
        }

        function unlockUI() {
          lockedSignal = null;
          up.classList.remove("thumb-selected", "thumb-dim");
          down.classList.remove("thumb-selected", "thumb-dim");
        }

        function postSignal(signal) {
          if (inflight) return;
          clearError();
          inflight = true;
          up.disabled = true;
          down.disabled = true;
          fetch("/api/chat/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_log_id: chatLogId, signal: signal }),
          })
            .then(function (res) {
              return res.text().then(function (t) {
                var body = {};
                try {
                  body = t ? JSON.parse(t) : {};
                } catch (ignore) {
                  body = {};
                }
                return { ok: res.ok, status: res.status, body: body };
              });
            })
            .then(function (result) {
              inflight = false;
              up.disabled = false;
              down.disabled = false;
              if (result.ok && result.body && result.body.ok === true) {
                setLockedUI(signal);
                return;
              }
              unlockUI();
              var msg = "Couldn't save that — try again";
              if (result.body && result.body.error) msg = String(result.body.error);
              else if (result.body && result.body.message) msg = String(result.body.message);
              showError(msg);
            })
            .catch(function () {
              inflight = false;
              up.disabled = false;
              down.disabled = false;
              unlockUI();
              showError("Couldn't save that — try again");
            });
        }

        up.addEventListener("click", function () {
          if (inflight) return;
          if (lockedSignal === "positive") return;
          postSignal("positive");
        });
        down.addEventListener("click", function () {
          if (inflight) return;
          if (lockedSignal === "negative") return;
          postSignal("negative");
        });

        btnRow.appendChild(up);
        btnRow.appendChild(down);
        wrap.appendChild(btnRow);
        wrap.appendChild(errEl);
        row.appendChild(wrap);
      }

      function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled = on;
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "absolute";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          textarea.setSelectionRange(0, textarea.value.length);
          try {
            var ok = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (ok) resolve();
            else reject(new Error("copy failed"));
          } catch (err) {
            document.body.removeChild(textarea);
            reject(err);
          }
        });
      }

      function setTemporaryButtonText(btn, text) {
        var original = btn.getAttribute("data-default-label") || "Share";
        btn.textContent = text;
        window.setTimeout(function () {
          btn.textContent = original;
        }, 2000);
      }

      function attachShareButtons() {
        var cards = log.querySelectorAll(".event-card[data-event-id]");
        cards.forEach(function (card) {
          if (card.querySelector(".event-share-btn")) return;
          var eventId = card.getAttribute("data-event-id");
          if (!eventId) return;
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "event-share-btn";
          btn.textContent = "Share";
          btn.setAttribute("data-default-label", "Share");
          btn.addEventListener("click", function () {
            var permalink = window.location.origin + "/events/" + eventId;
            copyToClipboard(permalink)
              .then(function () {
                setTemporaryButtonText(btn, "Link copied");
              })
              .catch(function () {
                setTemporaryButtonText(btn, "Copy failed");
              });
          });
          card.appendChild(btn);
        });
      }

      function removeAllChipsWraps() {
        log.querySelectorAll(".chips-wrap").forEach(function (w) {
          w.remove();
        });
      }

      var EXAMPLE_PROMPTS = [
        "What's on this weekend?",
        "Kids activities or swim lessons",
        "I'd like to add an event",
      ];

      function showExamplePromptChips() {
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Example prompts");
        EXAMPLE_PROMPTS.forEach(function (label) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = label;
          chip.addEventListener("click", function () {
            input.value = label;
            if (form.requestSubmit) form.requestSubmit();
            else form.dispatchEvent(new Event("submit", { cancelable: true }));
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
        scrollToBottom();
      }

      function postOnboarding(body, onSuccess, onFailure) {
        fetch("/api/chat/onboarding", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(Object.assign({ session_id: sessionId }, body)),
        })
          .then(function (res) {
            return res.text().then(function (t) {
              var parsed = {};
              try {
                parsed = t ? JSON.parse(t) : {};
              } catch (ignore) {
                parsed = {};
              }
              return { ok: res.ok, body: parsed };
            });
          })
          .then(function (r) {
            if (r.ok && r.body && r.body.ok === true) onSuccess(r.body);
            else onFailure(r);
          })
          .catch(function () {
            onFailure(null);
          });
      }

      function showKidsChips() {
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Kids with you");
        [["Yes", true], ["No", false]].forEach(function (pair) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = pair[0];
          chip.addEventListener("click", function () {
            chip.disabled = true;
            Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (c) {
              c.disabled = true;
            });
            postOnboarding(
              { has_kids: pair[1] },
              function () {
                wrap.remove();
                showExamplePromptChips();
              },
              function () {
                chip.disabled = false;
                Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (c) {
                  c.disabled = false;
                });
              }
            );
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
        scrollToBottom();
      }

      function showVisitorStatusChips() {
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Visiting or local");
        [["Visiting", "visiting"], ["Local", "local"]].forEach(function (pair) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = pair[0];
          chip.addEventListener("click", function () {
            chip.disabled = true;
            Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (c) {
              c.disabled = true;
            });
            postOnboarding(
              { visitor_status: pair[1] },
              function () {
                wrap.remove();
                addRow("bot", "Kids with you?");
                showKidsChips();
              },
              function () {
                chip.disabled = false;
                Array.prototype.forEach.call(wrap.querySelectorAll(".chip"), function (c) {
                  c.disabled = false;
                });
              }
            );
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
        scrollToBottom();
      }

      function showOnboardingFirstTurn() {
        addRow("bot", "Hey — welcome to Havasu. You visiting, or local?");
        showVisitorStatusChips();
      }

      showOnboardingFirstTurn();

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        removeAllChipsWraps();
        input.value = "";
        addRow("user", text);
        var pendingOut = addRow("bot", "…", "loading");
        var pendingBubble = pendingOut.bubble;
        var pendingRow = pendingOut.row;

        setLoading(true);
        fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, query: text }),
        })
          .then(function (res) {
            if (!res.ok) throw new Error("Request failed");
            return res.json();
          })
          .then(function (data) {
            pendingBubble.classList.remove("loading");
            pendingBubble.textContent = data.response || "(no response)";
            if (data.chat_log_id != null && data.chat_log_id !== "") {
              pendingRow.setAttribute("data-chat-log-id", String(data.chat_log_id));
            } else {
              pendingRow.removeAttribute("data-chat-log-id");
            }
            if (data.tier_used != null && data.tier_used !== "") {
              pendingRow.setAttribute("data-tier-used", String(data.tier_used));
            } else {
              pendingRow.removeAttribute("data-tier-used");
            }
            if (data.tier_used === "3" && data.chat_log_id) {
              attachFeedbackThumbs(pendingRow, String(data.chat_log_id));
            }
            attachShareButtons();
            scrollToBottom();
            if (data && data.data && data.data.open_calendar && window.havasuChatCalendar) {
              window.havasuChatCalendar.open();
            }
          })
          .catch(function () {
            pendingBubble.classList.remove("loading");
            pendingBubble.textContent = "Hmm, that didn’t go through — check your connection and try again.";
            scrollToBottom();
          })
          .finally(function () {
            setLoading(false);
            input.focus();
          });
      });

      input.focus();
      attachShareButtons();
    })();

    // Calendar overlay (Session AC-1). Self-contained; does not share state
    // with the chat IIFE above. Reads /events once and caches in memory.
    (function () {
      var overlay = document.getElementById("calendar-overlay");
      var btn = document.getElementById("calendar-btn");
      var titleEl = document.getElementById("cal-title");
      var gridEl = document.getElementById("cal-grid");
      var detailEl = document.getElementById("cal-day-detail");
      var prevBtn = document.getElementById("cal-prev");
      var nextBtn = document.getElementById("cal-next");
      var closeBtn = document.getElementById("cal-close");
      if (!overlay || !btn) return;

      var state = {
        year: new Date().getFullYear(),
        month: new Date().getMonth(),
        selectedKey: null,
        eventsByDate: null,
        loading: false,
      };

      var MONTH_LABELS = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December",
      ];

      function pad(n) { return n < 10 ? "0" + n : String(n); }
      function dateKey(y, m, d) { return y + "-" + pad(m + 1) + "-" + pad(d); }

      function isToday(y, m, d) {
        var t = new Date();
        return t.getFullYear() === y && t.getMonth() === m && t.getDate() === d;
      }

      function fmtTime(isoTime) {
        if (!isoTime) return "";
        var parts = isoTime.split(":");
        var h = parseInt(parts[0], 10);
        var m = parts[1] || "00";
        var ampm = h < 12 ? "AM" : "PM";
        var h12 = h % 12;
        if (h12 === 0) h12 = 12;
        return h12 + ":" + m + " " + ampm;
      }

      function loadEvents() {
        if (state.eventsByDate !== null || state.loading) return;
        state.loading = true;
        detailEl.innerHTML = '<div class="cal-loading">Loading events…</div>';
        fetch("/events", { headers: { "Accept": "application/json" } })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (events) {
            var map = {};
            (events || []).forEach(function (ev) {
              if (!ev || ev.status !== "live") return;
              var key = ev.date;
              if (!key) return;
              (map[key] = map[key] || []).push(ev);
            });
            Object.keys(map).forEach(function (k) {
              map[k].sort(function (a, b) {
                return (a.start_time || "").localeCompare(b.start_time || "");
              });
            });
            state.eventsByDate = map;
            state.loading = false;
            render();
          })
          .catch(function () {
            state.eventsByDate = {};
            state.loading = false;
            render();
          });
      }

      function renderGrid() {
        titleEl.textContent = MONTH_LABELS[state.month] + " " + state.year;
        gridEl.innerHTML = "";
        var first = new Date(state.year, state.month, 1);
        var leading = first.getDay();
        var daysInMonth = new Date(state.year, state.month + 1, 0).getDate();
        for (var i = 0; i < leading; i++) {
          var blank = document.createElement("div");
          blank.className = "cal-cell empty";
          gridEl.appendChild(blank);
        }
        for (var d = 1; d <= daysInMonth; d++) {
          var cell = document.createElement("button");
          cell.type = "button";
          cell.className = "cal-cell";
          cell.textContent = d;
          var key = dateKey(state.year, state.month, d);
          cell.setAttribute("data-key", key);
          if (isToday(state.year, state.month, d)) cell.classList.add("today");
          if (state.eventsByDate && state.eventsByDate[key]) cell.classList.add("has-events");
          if (state.selectedKey === key) cell.classList.add("selected");
          cell.addEventListener("click", (function (k) {
            return function () { selectDay(k); };
          })(key));
          gridEl.appendChild(cell);
        }
      }

      function renderDetail() {
        if (state.loading) {
          detailEl.innerHTML = '<div class="cal-loading">Loading events…</div>';
          return;
        }
        if (!state.selectedKey) {
          detailEl.innerHTML = '<div class="cal-empty-day">Tap a highlighted day to see what\'s on.</div>';
          return;
        }
        var events = (state.eventsByDate && state.eventsByDate[state.selectedKey]) || [];
        var parts = state.selectedKey.split("-");
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10) - 1;
        var d = parseInt(parts[2], 10);
        var label = MONTH_LABELS[m] + " " + d + ", " + y;
        var html = "<h3>" + label + "</h3>";
        if (events.length === 0) {
          html += '<div class="cal-empty-day">Nothing on the calendar for that day.</div>';
        } else {
          events.forEach(function (ev, idx) {
            var when = fmtTime(ev.start_time);
            if (ev.end_time) when += " – " + fmtTime(ev.end_time);
            var titleTxt = (ev.title || "").replace(/</g, "&lt;");
            var locTxt = (ev.location_name || "").replace(/</g, "&lt;");
            html += '<div class="cal-event" data-event-idx="' + idx +
              '" role="button" tabindex="0" title="Tap to open in chat">' +
              '<div class="title">' + titleTxt + "</div>" +
              '<div class="when">' + when + "</div>" +
              '<div class="where">' + locTxt + "</div>" +
              "</div>";
          });
        }
        detailEl.innerHTML = html;
      }

      // Build a chat bubble text blob for an event. Mirrors the backend's
      // _event_card format roughly so it reads natural when injected.
      function eventToChatText(ev) {
        var parts = (ev.date || "").split("-");
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10) - 1;
        var d = parseInt(parts[2], 10);
        var when = "";
        if (!isNaN(y) && !isNaN(m) && !isNaN(d)) {
          when = MONTH_LABELS[m] + " " + d + ", " + y;
        }
        var time = fmtTime(ev.start_time);
        if (ev.end_time) time += " – " + fmtTime(ev.end_time);
        var lines = [];
        if (when) lines.push("📅 " + when + (time ? " · " + time : ""));
        if (ev.location_name) lines.push("📍 " + ev.location_name);
        lines.push(ev.title || "");
        if (ev.description) {
          lines.push("");
          lines.push(String(ev.description).replace(/\r?\n/g, " "));
        }
        if (ev.event_url) lines.push("🔗 " + ev.event_url);
        return lines.join("\n");
      }

      function pushEventToChat(ev) {
        var log = document.getElementById("log");
        if (!log) return;
        var row = document.createElement("div");
        row.className = "row bot";
        var bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = eventToChatText(ev);
        row.appendChild(bubble);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
      }

      function handleEventTap(target) {
        var card = target.closest && target.closest(".cal-event");
        if (!card) return;
        var idx = parseInt(card.getAttribute("data-event-idx") || "-1", 10);
        if (idx < 0) return;
        var events = (state.eventsByDate && state.eventsByDate[state.selectedKey]) || [];
        var ev = events[idx];
        if (!ev) return;
        closeCalendar();
        pushEventToChat(ev);
      }

      function render() {
        renderGrid();
        renderDetail();
      }

      function selectDay(key) {
        state.selectedKey = key;
        render();
      }

      function openCalendar() {
        overlay.classList.add("open");
        document.body.style.overflow = "hidden";
        loadEvents();
        render();
      }

      function closeCalendar() {
        overlay.classList.remove("open");
        document.body.style.overflow = "";
      }

      btn.addEventListener("click", openCalendar);
      closeBtn.addEventListener("click", closeCalendar);
      detailEl.addEventListener("click", function (e) {
        handleEventTap(e.target);
      });
      detailEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          var card = e.target && e.target.closest && e.target.closest(".cal-event");
          if (card) { e.preventDefault(); handleEventTap(e.target); }
        }
      });
      overlay.addEventListener("click", function (e) {
        if (e.target === overlay) closeCalendar();
      });
      prevBtn.addEventListener("click", function () {
        state.month -= 1;
        if (state.month < 0) { state.month = 11; state.year -= 1; }
        render();
      });
      nextBtn.addEventListener("click", function () {
        state.month += 1;
        if (state.month > 11) { state.month = 0; state.year += 1; }
        render();
      });
      document.addEventListener("keydown", function (e) {
        if (!overlay.classList.contains("open")) return;
        if (e.key === "Escape") { e.preventDefault(); closeCalendar(); }
      });

      // Expose a hook so AC-2 (chat integration) can open from the chat flow.
      window.havasuChatCalendar = {
        open: openCalendar,
        close: closeCalendar,
        selectDay: function (key) {
          state.selectedKey = key;
          // Jump to that month if needed.
          var parts = (key || "").split("-");
          if (parts.length === 3) {
            state.year = parseInt(parts[0], 10);
            state.month = parseInt(parts[1], 10) - 1;
          }
          openCalendar();
        },
      };
    })();
  </script>
</body>
</html>
