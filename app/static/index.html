<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Havasu Chat</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f6f8;
      --user-bg: #0d6efd;
      --user-fg: #fff;
      --bot-bg: #e9ecef;
      --bot-fg: #212529;
      --border: #dee2e6;
      --radius: 18px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: #212529;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 100dvh;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: #6c757d;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .row {
      display: flex;
      width: 100%;
    }
    .row.user { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row.user .bubble {
      background: var(--user-bg);
      color: var(--user-fg);
      border-bottom-right-radius: 6px;
    }
    .row.bot .bubble {
      background: var(--bot-bg);
      color: var(--bot-fg);
      border-bottom-left-radius: 6px;
    }
    .row.bot .bubble.loading {
      color: #6c757d;
      font-style: italic;
    }
    .composer {
      display: flex;
      gap: 8px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 22px;
      font-size: 1rem;
      outline: none;
    }
    #msg:focus {
      border-color: #86b7fe;
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }
    #send {
      min-width: 72px;
      padding: 0 16px;
      border: none;
      border-radius: 22px;
      background: var(--user-bg);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .chips-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 12px;
      max-width: 100%;
    }
    .chip {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #212529;
      font-size: 0.88rem;
      line-height: 1.3;
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      text-align: left;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:active {
      background: #e9ecef;
    }
    .event-share-btn {
      margin-top: 12px;
      align-self: flex-start;
      border: 1px solid var(--border);
      background: var(--surface);
      color: #495057;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }
    .event-share-btn:active {
      background: #e9ecef;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Havasu Chat</h1>
      <p>Lake Havasu activities & events — search, browse, or share something new.</p>
    </header>
    <div id="log" role="log" aria-live="polite"></div>
    <form class="composer" id="form">
      <input id="msg" type="text" autocomplete="off" placeholder="Message…" enterkeyhint="send" />
      <button type="submit" id="send">Send</button>
    </form>
  </div>
  <script>
    (function () {
      var sessionId = (typeof crypto !== "undefined" && crypto.randomUUID)
        ? crypto.randomUUID()
        : "s-" + Date.now() + "-" + Math.random().toString(36).slice(2);
      var log = document.getElementById("log");
      var form = document.getElementById("form");
      var input = document.getElementById("msg");
      var sendBtn = document.getElementById("send");

      function scrollToBottom() {
        log.scrollTop = log.scrollHeight;
      }

      function addRow(role, text, extraClass) {
        var row = document.createElement("div");
        row.className = "row " + (role === "user" ? "user" : "bot");
        var bubble = document.createElement("div");
        bubble.className = "bubble" + (extraClass ? " " + extraClass : "");
        bubble.textContent = text;
        row.appendChild(bubble);
        log.appendChild(row);
        scrollToBottom();
        return bubble;
      }

      function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled = on;
      }

      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function (resolve, reject) {
          var textarea = document.createElement("textarea");
          textarea.value = text;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "absolute";
          textarea.style.left = "-9999px";
          document.body.appendChild(textarea);
          textarea.select();
          textarea.setSelectionRange(0, textarea.value.length);
          try {
            var ok = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (ok) resolve();
            else reject(new Error("copy failed"));
          } catch (err) {
            document.body.removeChild(textarea);
            reject(err);
          }
        });
      }

      function setTemporaryButtonText(btn, text) {
        var original = btn.getAttribute("data-default-label") || "Share";
        btn.textContent = text;
        window.setTimeout(function () {
          btn.textContent = original;
        }, 2000);
      }

      function attachShareButtons() {
        var cards = log.querySelectorAll(".event-card[data-event-id]");
        cards.forEach(function (card) {
          if (card.querySelector(".event-share-btn")) return;
          var eventId = card.getAttribute("data-event-id");
          if (!eventId) return;
          var btn = document.createElement("button");
          btn.type = "button";
          btn.className = "event-share-btn";
          btn.textContent = "Share";
          btn.setAttribute("data-default-label", "Share");
          btn.addEventListener("click", function () {
            var permalink = window.location.origin + "/events/" + eventId;
            copyToClipboard(permalink)
              .then(function () {
                setTemporaryButtonText(btn, "Link copied");
              })
              .catch(function () {
                setTemporaryButtonText(btn, "Copy failed");
              });
          });
          card.appendChild(btn);
        });
      }

      function removeWelcomeChips() {
        var w = log.querySelector(".chips-wrap");
        if (w) w.remove();
      }

      var EXAMPLE_PROMPTS = [
        "What's on this weekend?",
        "Kids activities or swim lessons",
        "I'd like to add an event",
      ];

      function showWelcome() {
        addRow(
          "bot",
          "Welcome. Ask what’s happening in town, search by interest, or say you want to add an event — I’ll walk you through it."
        );
        var wrap = document.createElement("div");
        wrap.className = "chips-wrap";
        wrap.setAttribute("role", "group");
        wrap.setAttribute("aria-label", "Example prompts");
        EXAMPLE_PROMPTS.forEach(function (label) {
          var chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = label;
          chip.addEventListener("click", function () {
            input.value = label;
            if (form.requestSubmit) form.requestSubmit();
            else form.dispatchEvent(new Event("submit", { cancelable: true }));
          });
          wrap.appendChild(chip);
        });
        log.appendChild(wrap);
      }

      showWelcome();

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        removeWelcomeChips();
        input.value = "";
        addRow("user", text);
        var pending = addRow("bot", "…", "loading");

        setLoading(true);
        fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, message: text }),
        })
          .then(function (res) {
            if (!res.ok) throw new Error("Request failed");
            return res.json();
          })
          .then(function (data) {
            pending.textContent = data.response || "(no response)";
            attachShareButtons();
            scrollToBottom();
          })
          .catch(function () {
            pending.classList.remove("loading");
            pending.textContent = "Hmm, that didn’t go through — check your connection and try again.";
            scrollToBottom();
          })
          .finally(function () {
            setLoading(false);
            input.focus();
          });
      });

      input.focus();
      attachShareButtons();
    })();
  </script>
</body>
</html>
